name: Fahrzeugbestand abrufen

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  fetch-bestand:
    runs-on: ubuntu-latest

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Fahrzeugbestand von Mobile.de abrufen
        env:
          MOBILE_USER: ${{ secrets.MOBILE_USER }}
          MOBILE_PASS: ${{ secrets.MOBILE_PASS }}
        run: |
          curl -s \
            -u "$MOBILE_USER:$MOBILE_PASS" \
            -H "Accept: application/vnd.de.mobile.api+json" \
            "https://services.mobile.de/seller-api/sellers/ELEGANCECARSAFI/ads" \
            -o raw.json

          echo "API Antwort (erste 300 Zeichen):"
          head -c 300 raw.json

          python3 fetch_bestand.py

      - name: JSON committen und pushen
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bestand.json
          git diff --staged --quiet || git commit -m "Bestand aktualisiert $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
